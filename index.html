<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAILFORGE</title>
    <style>
    
        /* The Side Navigation Menu */
.sidebar {
    height: 100%;
    width: 0; /* Hidden by default */
    position: fixed;
    z-index: 1000;
    top: 0;
    left: 0;
    background-color: #111;
    overflow-x: hidden;
    transition: 0.3s; /* Slide effect */
    padding-top: 60px;
}

/* Links inside the sidebar */
.sidebar a {
    padding: 15px 25px;
    text-decoration: none;
    font-size: 1.2rem;
    color: #818181;
    display: block;
    transition: 0.2s;
}

.sidebar a:hover {
    color: #f1f1f1;
    background-color: #2e7d32; /* Green highlight */
}

/* The Close Button (X) */
.sidebar .closebtn {
    position: absolute;
    top: 10px;
    right: 25px;
    font-size: 36px;
}

/* The 3-line Menu Button */
.openbtn {
    font-size: 30px;
    cursor: pointer;
    background: rgba(0,0,0,0.5);
    color: white;
    padding: 10px 15px;
    border: none;
    position: fixed; /* Stays in the corner */
    top: 15px;
    left: 15px;
    z-index: 999;
    border-radius: 5px;
}

.openbtn:hover {
    background-color: #444;
}

        :root {
            --primary: #2e7d32; /* Minecraft Green */
            --dark: #1a1a1a;
            --light: #f4f4f4;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: var(--light);
        }
        

        /* Hero Section */
        .header {
            height: 300px;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('/logo.png') no-repeat center center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }

        .header h1 {
            font-size: 3rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin: 0;
        }

        /* Card Container */
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        /* The Card */
        .card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card-image {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background-color: #ddd;
        }

        .card-content {
            padding: 15px;
        }

        .card-title {
            font-size: 1.25rem;
            margin: 0 0 10px 0;
            color: var(--dark);
        }

        .card-desc {
            font-size: 0.9rem;
            color: #666;
            line-height: 1.4;
            height: 40px;
            overflow: hidden;
        }

        .download-btn {
            display: block;
            background: var(--primary);
            color: white;
            text-align: center;
            padding: 10px;
            text-decoration: none;
            border-radius: 4px;
            margin-top: 15px;
            font-weight: bold;
        }

        .download-btn:hover {
            background: #1b5e20;
        }
        
       
    </style>
</head>
<body>

    <header class="header">
        <h1>RailForge India</h1>
    </header>
    <!-- The Sidebar -->
<div id="mySidebar" class="sidebar">
  <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
  <a href="#">Home</a>
  <a href="about.html">About Us</a>
</div>

<!-- The Menu Button -->
<button class="openbtn" onclick="openNav()">&#9776;</button>


    <div class="container">
        <!-- START OF CARD -->
        <div class="card">
            <img src="/files/WDP4D/pack_icon.png" alt="Train Preview image" class="card-image">
            <div class="card-content">
                <h2 class="card-title">WDP-4 LOCOMITIVE ADDON</h2>
                <p class="card-desc">High-detail WDP-4 DESEL LOCOMOTIVE with custom sounds and interior.</p>
                <a href="files/WDP4D/wdp4D.html" class="download-btn">VIEW ADDON</a>
            </div>
        </div>
        
        <!-- END OF CARD -->
    </div>
    

</body>
<script>
function openNav() {
  document.getElementById("mySidebar").style.width = "250px";
}

function closeNav() {
  document.getElementById("mySidebar").style.width = "0";
}
</script>

</html>
