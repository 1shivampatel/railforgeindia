<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Auto Fetch Gallery</title>

<style>

/* ================= ROOT ================= */
:root {
    --primary: #00c853;
    --secondary: #00e5ff;
    --dark: #0f1115;
    --card: rgba(255,255,255,0.05);
    --text: #e0e0e0;
}

/* ================= BODY ================= */
body{
    margin:0;
    font-family:Copperplate, Papyrus, fantasy;
    background: radial-gradient(circle at top, #1a1d24, #0f1115);
    color:var(--text);
}

/* ================= HEADER ================= */
.header{
    height:220px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:linear-gradient(rgba(0,0,0,.7), rgba(0,0,0,.8)),
    url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1200&auto=format&fit=crop')
    center/cover;
}

.header h1{
    font-size:2.5rem;
    background:linear-gradient(90deg,var(--primary),var(--secondary));
    -webkit-background-clip:text;
    color:transparent;
}

/* ================= CONTAINER ================= */
.container{
    max-width:1200px;
    margin:40px auto;
    padding:0 20px;
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
    gap:25px;
}

/* ================= CARD ================= */
.card{
    background:var(--card);
    border-radius:18px;
    overflow:hidden;
    border:1px solid rgba(255,255,255,0.08);
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
    transition:.3s;
}

.card:hover{
    transform:translateY(-8px);
}

.video-frame{
    width:100%;
    height:220px;
    border:none;
}

.card-content{
    padding:15px;
}

.card-title{
    font-size:1.1rem;
    color:white;
    margin-bottom:8px;
}

.card-desc{
    color:#bbb;
    font-size:0.9rem;
}

</style>
</head>
<body>

<div class="header">
    <h1>YouTube Auto Fetch Gallery</h1>
</div>

<div class="container" id="videoContainer"></div>

<script>

/* ================= VIDEO LINKS ================= */

const videoLinks = [
    
];

/* ================= GET VIDEO ID ================= */

function getYoutubeVideoId(url) {

    // NORMAL YOUTUBE VIDEO
    if(url.includes("watch?v=")) {
        return new URL(url).searchParams.get("v");
    }

    // YOUTUBE SHORTS
    if(url.includes("/shorts/")) {
        return url.split("/shorts/")[1].split("?")[0];
    }

    return null;
}

/* ================= CREATE CARDS ================= */

const container = document.getElementById("videoContainer");

videoLinks.forEach(async (link) => {

    const videoId = getYoutubeVideoId(link);

    if(!videoId) return;

    try {

        // FETCH VIDEO TITLE
        const response = await fetch(
            `https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${videoId}&format=json`
        );

        const data = await response.json();

        // CREATE CARD
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <iframe class="video-frame"
            src="https://www.youtube.com/embed/${videoId}"
            allowfullscreen>
            </iframe>

            <div class="card-content">
                <div class="card-title">
                    ${data.title}
                </div>

                <div class="card-desc">
                    YouTube Video
                </div>
            </div>
        `;

        container.appendChild(card);

    } catch(error) {

        console.log("Failed to load video:", link);

    }

});

</script>

</body>
</html>
