<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAILFORGE-INDIA</title>
<link rel="stylesheet" href="style.css">
<style>
   .upload {
    font-size: 20px;
    cursor: pointer;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    color: white;
    padding: 10px 15px;
    border: 1px solid rgba(255,255,255,0.2);
    position: fixed;
    bottom: 15px;
    right: 15px;
    z-index: 999;
    border-radius: 8px;
    transition: 0.3s;
}
  .mc-home-btn {
    /* Position */
    position: fixed;
    top: 15px;
    left: 15px;
    z-index: 1000;

    /* Minecraft Aesthetic */
    display: inline-block;
    padding: 10px 20px;
    background-color: rgba(62, 175, 52, 0.5); /* Green with 50% transparency */
    color: white;
    text-decoration: none;
    font-family: "Courier New", Courier, monospace; /* Blocky font vibe */
    font-weight: bold;
    text-shadow: 2px 2px #000;
    
    /* Border Styling */
    border: 3px solid rgba(255, 255, 255, 0.5);
    box-shadow: inset -4px -4px 0px rgba(0, 0, 0, 0.2);
    
    /* Responsive adjustment */
    font-size: 16px;
    transition: all 0.2s;
  }
  .video-frame{
    width:100%;
    height:220px;
    border:none;
}

.card-content{
    padding:15px;
}

.card-title{
    font-size:1.1rem;
    color:white;
    margin-bottom:8px;
}

.card-desc{
    color:#bbb;
    font-size:0.9rem;
}


</style>

<link rel="stylesheet" href="style.css">
</head>
<body>

<a href="index.html" class="mc-home-btn">HOME</a>
<div class="header">
    <h1>RAILFORGE-INDIA<br>(REVIEW/EDIT VIDEOS)</h1>
</div>
<button class="upload">+</button>

<div style="display:none;
background: rgba(255, 255, 255, 0.05);
    border-radius: 15px;
    overflow: hidden;
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    transition: 0.3s;
    animation: fadeInUp 0.8s ease;" id="videoContainer"></div>
    

    



<script>

/* ================= VIDEO LINKS ================= */

const videoLinks = [
    "https://youtube.com/shorts/yUJgMAxe4t0?si=KsxIijqbWXRoGgMN",
    "https://youtu.be/OTEyrfDl8Ng?si=6C0zo9dw191lSV02",
    "https://youtube.com/shorts/t3vJf0OGNW4?si=MIcBDfmA3DiZLFYU",
    "https://youtube.com/shorts/T65Xn7xX8cc?si=Ttp-54TcGZIQhbqT",
    "https://youtube.com/shorts/csllJcIEGC0?si=iszNtAveeaX9d9bb",
    "https://youtube.com/shorts/Flic9FZKQP8?si=8k3K3BmIe1WH2Exj",
    "https://youtube.com/shorts/nrJbn10FHqY?si=sjZ9-OlLf8pGLykc"
];

/* ================= GET VIDEO ID ================= */

function getYoutubeVideoId(url) {

    // NORMAL YOUTUBE VIDEO
    if(url.includes("watch?v=")) {
        console.log(url)
        return new URL(url).searchParams.get("v");
        
    }

    // YOUTUBE SHORTS
    if(url.includes("/shorts/")) {
        console.log(url)
        return url.split("/shorts/")[1].split("?")[0];
        
    }
    
    // YOUTU.BE SHORT LINK
    if(url.includes("youtu.be/")) {
        return url.split("youtu.be/")[1].split("?")[0];
        
    }
    
    
    

    return null;
}

/* ================= CREATE CARDS ================= */

const container = document.getElementById("videoContainer");

videoLinks.forEach(async (link) => {

    const videoId = getYoutubeVideoId(link);

    if(!videoId) return;

    try {

        // FETCH VIDEO TITLE
        const response = await fetch(
            `https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${videoId}&format=json`
        );

        const data = await response.json();

        // CREATE CARD
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <iframe class="video-frame"
            src="https://www.youtube.com/embed/${videoId}"
            allowfullscreen>
            </iframe>

            <div class="card-content">
                <div class="card-title">
                    ${data.title}
                </div>

                <div class="card-desc">
                    YouTube Video
                </div>
            </div>
        `;

        container.appendChild(card);

    } catch(error) {

        console.log("Failed to load video:", link);

    }

});

</script>

</body>
</html>
