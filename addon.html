<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAILFORGE</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Embedded styling if needed */
    </style>
</head>

<body>
    <div class="parallax"></div>

<div id="loader">
  <div class="logoGlow">RAILFORGE-INDIA<br>ADDONS</div>
  <div class="loaderBar"></div>
</div>

<header class="header">
    <h1>RailForge India<br>(Addons)</h1>
</header>

<div id="overlay" onclick="closeNav()"></div>

<div id="mySidebar" class="sidebar">
  <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">×</a>
  <a href="index.html">🏠 Home</a>
  <a href="update.html">📜 Update Log</a>
  <a href="bugrepo.html">🐞 Bug Report</a>
  <a href="about.html">ℹ️ About Us</a>
</div>

<button class="openbtn" onclick="openNav()">☰</button>

<div class="search-container">
    <input type="text" id="searchInput" onkeyup="searchCards()" placeholder="Search for stuffs ...">
</div>

<div class="container" id="cardsContainer"></div>

<button id="load-more-btn" class="download-btn" style="width:100%; margin:40px auto;">load more</button>

<script src="script.js"></script>
<script>
// Array to hold the data globally for searching
let allAddons = [];

// Fetch data from addon.json and render them
async function loadAddons() {
    try {
        const response = await fetch('addon.json');
        allAddons = await response.json();
        renderCards(allAddons);
    } catch (error) {
        console.error("Error loading the addons configuration:", error);
        document.getElementById('cardsContainer').innerHTML = "<p style='color:white; text-align:center;'>Failed to load addons.</p>";
    }
}

// Function to generate card HTML components dynamically
function renderCards(addons) {
    const container = document.getElementById('cardsContainer');
    container.innerHTML = ""; // Clear existing fallback entries

    addons.forEach(addon => {
        const card = document.createElement('div');
        card.className = 'card';

        // Check if item should include a recommended tag (optional bonus helper)
        const tagHTML = addon.isRecommended ? `<span class="addon-tag">Recommended</span>` : '';

        card.innerHTML = `
            <img src="${addon.cardImageUrl}" class="card-image" alt="${addon.cardName}">
            <div class="card-content">
                ${tagHTML}
                <h2 class="card-title">${addon.cardName}</h2>
                <p class="card-desc">${addon.cardDescription}</p>
                <a href="${addon.cardViewAddonUrl}" class="download-btn">VIEW ADDON</a>
            </div>
        `;
        container.appendChild(card);
    });
}

// Optimized client side filtering function
function searchCards() {
    let input = document.getElementById('searchInput').value.toLowerCase();
    let cards = document.getElementsByClassName('card');

    for (let i = 0; i < cards.length; i++) {
        let title = cards[i].querySelector('.card-title').innerText.toLowerCase();
        let desc = cards[i].querySelector('.card-desc').innerText.toLowerCase();

        if (title.includes(input) || desc.includes(input)) {
            cards[i].style.display = "";
        } else {
            cards[i].style.display = "none";
        }
    }
}

function openNav() {
  document.getElementById("mySidebar").style.width = "250px";
}

// Fixed the broken multi-line function syntax from original snippet
function closeNav() {
  document.getElementById("mySidebar").style.width = "0";
}

// Trigger data pull once DOM loads up
window.addEventListener('DOMContentLoaded', loadAddons);
</script>

<script src="main.js"></script>

<canvas id="trainCanvas"></canvas>

</body>
</html>
