<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAILFORGE</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
    <h1>RailForge India<br>(Worlds)</h1>
</header>

<div id="overlay" onclick="closeNav()"></div>

<div id="mySidebar" class="sidebar">
  <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">×</a>
  <a href="index.html">🏠 Home</a>
  <a href="update.html">📜 Update Log</a>
  <a href="bugrepo.html">🐞 Bug Report</a>
  <a href="about.html">ℹ️ About Us</a>
</div>

<button class="openbtn" onclick="openNav()">☰</button>

<div class="search-container">
    <input type="text" id="searchInput" onkeyup="searchCards()" placeholder="Search for stuffs ...">
</div>

<div class="container" id="worldsContainer"></div>

<button id="load-more-btn" class="download-btn" style="width:100%; margin: 40px auto;">load more</button>

<script src="script.js"></script>

<script>
// Array to store data for client-side search filtering
let allWorlds = [];

// Fetch data from world.json and render them
async function loadWorlds() {
    try {
        const response = await fetch('world.json');
        allWorlds = await response.json();
        renderCards(allWorlds);
    } catch (error) {
        console.error("Error loading the worlds configuration:", error);
        document.getElementById('worldsContainer').innerHTML = "<p style='color:white; text-align:center;'>Failed to load worlds.</p>";
    }
}

// Function to generate card HTML elements dynamically
function renderCards(worlds) {
    const container = document.getElementById('worldsContainer');
    container.innerHTML = ""; // Clear baseline structural content

    worlds.forEach(world => {
        const card = document.createElement('div');
        card.className = 'card';

        card.innerHTML = `
            <img src="${world.cardImageUrl}" class="card-image" alt="${world.cardName}">
            <div class="card-content">
                <h2 class="card-title">${world.cardName}</h2>
                <p class="card-desc">${world.cardDescription}</p>
                <a href="${world.cardViewAddonUrl}" class="download-btn">VIEW ROUTE</a>
            </div>
        `;
        container.appendChild(card);
    });
}

// Client side live text search engine
function searchCards() {
    let input = document.getElementById('searchInput').value.toLowerCase();
    let cards = document.getElementsByClassName('card');

    for (let i = 0; i < cards.length; i++) {
        let title = cards[i].querySelector('.card-title').innerText.toLowerCase();
        let desc = cards[i].querySelector('.card-desc').innerText.toLowerCase();

        if (title.includes(input) || desc.includes(input)) {
            cards[i].style.display = "";
        } else {
            cards[i].style.display = "none";
        }
    }
}

function openNav() {
  document.getElementById("mySidebar").style.width = "250px";
}

// Fixed the broken, fragmented line syntax error from the original code template
function closeNav() {
  document.getElementById("mySidebar").style.width = "0";
}

// Initialize lifecycle setup on load
window.addEventListener('DOMContentLoaded', loadWorlds);
</script>

</body>
</html>
